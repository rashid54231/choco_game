name: choco_blast_adventure
description: "Choco Blast Adventure - a juicy match-3 puzzle game built with Flutter and Supabase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Backend
  supabase_flutter: ^2.7.0

  # Local storage
  shared_preferences: ^2.3.2

  # Animations
  flutter_animate: ^4.5.0

  # Audio
  audioplayers: ^6.1.0

  # Confetti / effects
  confetti: ^0.8.0

  # For maps / utilities
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  fonts:
    - family: Baloo2
      fonts:
        - asset: assets/fonts/Baloo2-Variable.ttf

  assets:
    - assets/images/
    - assets/audio/
